<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="houseGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#6b7f5c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3d5a3c;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Roof -->
  <path d="M 10,45 L 50,15 L 90,45 Z" fill="#c86f4c"/>
  <!-- House body -->
  <rect x="20" y="45" width="60" height="40" fill="url(#houseGrad)"/>
  <!-- Door -->
  <rect x="42" y="60" width="16" height="25" fill="#7c5d4f" rx="2"/>
  <!-- Windows -->
  <rect x="28" y="52" width="10" height="10" fill="#d4a337" rx="1"/>
  <rect x="62" y="52" width="10" height="10" fill="#d4a337" rx="1"/>
  <!-- Chimney -->
  <rect x="65" y="30" width="8" height="15" fill="#a84c2c"/>
</svg>
